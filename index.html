<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>どうぞどうぞ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --page-bg:   #2C1F0E;
      --card-bg:   #E8D9B8;
      --felt-bg:   #1E3D10;
      --felt-ring: #163008;
      --table-rim: #3a2008;
      --ink:       #1a0e04;
      --ink2:      #5C3D1E;
      --ink3:      #9a7040;
      --cream:     #FDFAF3;
      --rule:      #9a7040;
      --chip-gold: #C8860A;
      --chip-rim:  #7A5200;
      --chip-hi:   #E8A020;
      --run-bg:    #d4edcc;
      --run-fg:    #1E3D10;
      --run-border:#3a7a28;
      --radius:    5px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --page-bg:   #150d04;
        --card-bg:   #2a2018;
        --felt-bg:   #163008;
        --felt-ring: #0d1f06;
        --table-rim: #251404;
        --ink:       #E8D5B0;
        --ink2:      #C4A97A;
        --ink3:      #8a6840;
        --cream:     #2a2018;
        --rule:      #6a5030;
        --chip-gold: #C8860A;
        --chip-rim:  #5a3a00;
        --chip-hi:   #E8A020;
        --run-bg:    #163008;
        --run-fg:    #7FCC60;
        --run-border:#3a7a28;
      }
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--page-bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1rem;
    }

    #app { width: 100%; max-width: 460px; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── Setup ── */
    .setup-card {
      background: var(--card-bg);
      border-radius: 10px;
      border: 1.5px solid var(--rule);
      padding: 2rem 1.5rem;
      margin-top: 1rem;
    }
    .setup-title {
      font-size: 32px;
      font-weight: 700;
      text-align: center;
      color: var(--ink);
      letter-spacing: 0.04em;
      margin-bottom: 2px;
    }
    .setup-sub {
      text-align: center;
      font-size: 13px;
      color: var(--ink3);
      margin-bottom: 1.75rem;
      letter-spacing: 0.08em;
    }
    .setup-label {
      font-size: 11px;
      color: var(--ink3);
      letter-spacing: 0.12em;
      margin-bottom: 8px;
      text-align: center;
    }
    .num-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-bottom: 8px;
    }
    .num-btn {
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      padding: 12px 4px;
      font-size: 14px;
      font-weight: 700;
      font-family: Georgia, serif;
      cursor: pointer;
      text-align: center;
      color: var(--ink);
      transition: background 0.15s;
    }
    .num-btn.sel {
      background: var(--ink);
      color: var(--cream);
      border-color: var(--ink);
    }
    .setup-info {
      text-align: center;
      font-size: 12px;
      color: var(--ink3);
      margin-bottom: 1.5rem;
      min-height: 18px;
      letter-spacing: 0.06em;
    }
    .btn-start {
      width: 100%;
      background: var(--ink);
      color: var(--cream);
      border: 1.5px solid var(--ink);
      border-radius: var(--radius);
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      font-family: Georgia, serif;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: opacity 0.15s;
    }
    .btn-start:hover { opacity: 0.75; }

    .howto {
      margin-top: 1.5rem;
      border-top: 1px solid var(--rule);
      padding-top: 1rem;
    }
    .howto-title {
      font-size: 11px;
      color: var(--ink3);
      letter-spacing: 0.12em;
      margin-bottom: 8px;
    }
    .howto-body {
      font-size: 13px;
      color: var(--ink2);
      line-height: 1.85;
    }
    .howto-body strong { color: var(--ink); font-weight: 700; }

    /* ── Game ── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0 8px;
    }
    .back-btn {
      background: none;
      border: none;
      font-size: 12px;
      font-family: Georgia, serif;
      color: var(--ink3);
      cursor: pointer;
      letter-spacing: 0.06em;
      padding: 0;
    }
    .back-btn:hover { color: var(--ink2); }
    .deck-count {
      font-size: 12px;
      color: var(--ink3);
      letter-spacing: 0.06em;
    }

    .turn-wrap { text-align: center; margin-bottom: 8px; min-height: 22px; }
    .turn-badge {
      display: inline-block;
      border: 1px solid var(--ink);
      border-radius: 3px;
      padding: 1px 14px;
      font-size: 12px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: 0.08em;
    }

    /* 円卓 */
    .table-wrap {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--table-rim);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
      max-width: 320px;
      border: 5px solid #1a0a00;
    }
    .table-felt {
      width: 92%;
      height: 92%;
      border-radius: 50%;
      background: var(--felt-bg);
      border: 3px solid var(--felt-ring);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* デッキ */
    .deck-pile {
      position: absolute;
      left: 18%;
      top: 50%;
      transform: translateY(-50%);
      width: 72px;
      height: 100px;
    }
    .deck-c {
      position: absolute;
      width: 72px;
      height: 100px;
      border-radius: 6px;
      border: 1.5px solid var(--felt-ring);
      background: var(--cream);
      top: 0; left: 0;
    }
    .deck-c:nth-child(1) { transform: translate(-4px, -4px); }
    .deck-c:nth-child(2) { transform: translate(-2px, -2px); }
    .deck-c:nth-child(3) { transform: translate(0, 0); }
    .deck-pattern {
      width: 100%; height: 100%;
      border-radius: 4px;
      background-image: repeating-linear-gradient(
        45deg,
        var(--felt-bg) 0px, var(--felt-bg) 3px,
        var(--felt-ring) 3px, var(--felt-ring) 8px
      );
      opacity: 0.9;
    }

    /* 場のカード＋チップ */
    .field-area {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-38%, -50%);
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .field-card {
      width: 100px;
      height: 140px;
      border-radius: 7px;
      background: var(--cream);
      border: 2px solid var(--ink2);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .card-corner {
      position: absolute;
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
    }
    .card-corner.tl { top: 6px; left: 8px; }
    .card-corner.br { bottom: 6px; right: 8px; transform: rotate(180deg); }
    .card-main-num {
      font-size: 52px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
    }
    .card-horse { margin-top: 4px; color: var(--ink); }

    /* チップ */
    .chips-stack {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-top: 6px;
      align-items: center;
      min-width: 32px;
    }
    .chip {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--chip-gold);
      border: 3px solid var(--chip-rim);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chip-inner {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--chip-hi);
      border: 1px solid var(--chip-rim);
    }
    .chips-count {
      font-size: 11px;
      color: var(--chip-hi);
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-top: 2px;
    }

    .status-msg {
      text-align: center;
      font-size: 12px;
      color: var(--ink3);
      min-height: 18px;
      margin: 2px 0 8px;
      letter-spacing: 0.04em;
    }

    /* ボタン（活版） */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .btn-take {
      background: transparent;
      color: var(--ink);
      border: 1.5px solid var(--ink);
      border-radius: var(--radius);
      padding: 13px 8px;
      font-size: 15px;
      font-weight: 700;
      font-family: Georgia, serif;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: background 0.15s, color 0.15s;
    }
    .btn-take:hover { background: var(--ink); color: var(--cream); }
    .btn-pass {
      background: transparent;
      color: var(--ink3);
      border: 1px solid var(--ink3);
      border-radius: var(--radius);
      padding: 13px 8px;
      font-size: 15px;
      font-family: Georgia, serif;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s, color 0.15s;
    }
    .btn-pass:hover { background: var(--ink3); color: var(--cream); }
    .btn-take:disabled, .btn-pass:disabled { opacity: 0.3; cursor: not-allowed; }

    /* プレイヤーリスト */
    .players-wrap { display: flex; flex-direction: column; gap: 6px; }
    .player-row {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 9px 12px;
      border: 1px solid var(--rule);
      transition: border-color 0.2s;
    }
    .player-row.is-active { border-color: var(--ink); border-width: 1.5px; }
    .p-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .p-name { font-size: 13px; font-weight: 700; color: var(--ink); letter-spacing: 0.04em; }
    .p-meta { display: flex; gap: 12px; font-size: 12px; color: var(--ink3); }
    .p-score { font-weight: 700; color: var(--ink); }
    .cards-list { display: flex; flex-wrap: wrap; gap: 3px; }
    .card-tag {
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 12px;
      font-family: Georgia, serif;
      color: var(--ink2);
    }
    .card-tag.run {
      background: var(--run-bg);
      color: var(--run-fg);
      border-color: var(--run-border);
    }
    .no-cards { font-size: 12px; color: var(--ink3); }

    /* ── Result ── */
    .result-card {
      background: var(--card-bg);
      border: 1.5px solid var(--rule);
      border-radius: 10px;
      padding: 2rem 1.5rem;
      text-align: center;
      margin-top: 1rem;
    }
    .result-title { font-size: 26px; font-weight: 700; margin-bottom: 1rem; letter-spacing: 0.04em; }
    .result-table {
      width: 100%; border-collapse: collapse; font-size: 13px;
      margin-bottom: 1.25rem; text-align: left; font-family: Georgia, serif;
    }
    .result-table th {
      font-weight: 700; padding: 6px 8px;
      border-bottom: 1px solid var(--rule);
      color: var(--ink3); letter-spacing: 0.06em; font-size: 11px;
    }
    .result-table td { padding: 7px 8px; border-bottom: 1px solid var(--rule); color: var(--ink); }
    .result-table tr.winner td { background: var(--run-bg); color: var(--run-fg); font-weight: 700; }
    .btn-restart {
      background: transparent; color: var(--ink);
      border: 1.5px solid var(--ink); border-radius: var(--radius);
      padding: 12px 36px; font-size: 14px; font-weight: 700;
      font-family: Georgia, serif; cursor: pointer; letter-spacing: 0.08em;
      transition: background 0.15s, color 0.15s;
    }
    .btn-restart:hover { background: var(--ink); color: var(--cream); }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Setup ── -->
  <div id="screen-setup" class="screen active">
    <div class="setup-card">
      <div class="setup-title">どうぞどうぞ</div>
      <div class="setup-sub">〜 譲り合いの精神 〜</div>
      <div class="setup-label">プレイヤー人数（あなた＋CP）</div>
      <div class="num-grid" id="num-grid"></div>
      <div class="setup-info" id="setup-info"></div>
      <button class="btn-start" onclick="startGame()">ゲーム開始</button>
      <div class="howto">
        <div class="howto-title">遊び方</div>
        <div class="howto-body">
          場に出たカードを<strong>取る</strong>か、チップを1枚置いて<strong>どうぞどうぞ</strong>するかを選びます。カードを取ると、そのカードと場のチップをすべて受け取ります。<br><br>
          <strong>得点（低いほど勝ち）</strong><br>
          カードの数値がそのままマイナス点。ただし<strong>連続する数字はまとめて最小値のみ</strong>カウント。チップ1枚につき −1点。<br><br>
          例：17・18・19 → 17点のみ。残チップ3枚なら −3点。
        </div>
      </div>
    </div>
  </div>

  <!-- ── Game ── -->
  <div id="screen-game" class="screen">
    <div class="topbar">
      <button class="back-btn" onclick="showSetup()">← トップへ</button>
      <span class="deck-count" id="deck-info">山札: -- 枚</span>
      <span style="width:52px;"></span>
    </div>
    <div class="turn-wrap" id="turn-wrap"></div>
    <div class="table-wrap">
      <div class="table-felt">
        <div class="deck-pile">
          <div class="deck-c"></div>
          <div class="deck-c"></div>
          <div class="deck-c"><div class="deck-pattern"></div></div>
        </div>
        <div class="field-area">
          <div class="field-card">
            <span class="card-corner tl" id="card-corner-tl">--</span>
            <span class="card-corner br" id="card-corner-br">--</span>
            <div class="card-main-num" id="card-number">--</div>
            <div class="card-horse" id="card-horse"></div>
          </div>
          <div class="chips-stack" id="chips-stack"></div>
        </div>
      </div>
    </div>
    <div class="status-msg" id="status-msg"></div>
    <div class="btn-row">
      <button class="btn-take" id="btn-take" onclick="playerAction('take')">取る</button>
      <button class="btn-pass" id="btn-pass" onclick="playerAction('pass')">どうぞどうぞ</button>
    </div>
    <div class="players-wrap" id="players-wrap"></div>
  </div>

  <!-- ── Result ── -->
  <div id="screen-result" class="screen">
    <div class="result-card">
      <div class="result-title" id="result-title"></div>
      <table class="result-table" id="result-table"></table>
      <button class="btn-restart" onclick="showSetup()">もう一度</button>
    </div>
  </div>

</div>
<script>
const CHIP_MAP = {2:11,3:11,4:11,5:11,6:9,7:7};
let G = {};
let selectedN = 3;

const HORSE_SVG = `<svg width="40" height="28" viewBox="0 0 40 28" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M9 26C9 26 6 21 7 17C8 13 11 11 12 10C13 9 13 6 16 5C19 4 20 5 21 6C22 7 22 9 24 9C27 9 28 8 29 9C30 10 29 13 28 14L27 15C28 16 29 19 28 21C27 23 24 26 22 26L9 26Z" fill="currentColor"/>
  <path d="M12 10C12 10 11 7 12 6C13 5 15 6 15 7" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M22 26L21 28M17 26L16 28M11 26L10 28" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="28" cy="8" r="2" fill="white" opacity="0.4"/>
</svg>`;

function showScreen(id) {
  ['screen-setup','screen-game','screen-result'].forEach(s => {
    document.getElementById(s).classList.toggle('active', s === id);
  });
}

function buildSetup() {
  const grid = document.getElementById('num-grid');
  grid.innerHTML = '';
  for (let n = 2; n <= 6; n++) {
    const b = document.createElement('button');
    b.className = 'num-btn' + (n === selectedN ? ' sel' : '');
    b.textContent = n + '人';
    b.onclick = () => { selectedN = n; buildSetup(); };
    grid.appendChild(b);
  }
  const chips = CHIP_MAP[selectedN];
  document.getElementById('setup-info').textContent =
    `チップ ${chips} 枚 / 人　（CP は ${selectedN - 1} 人）`;
}

function showSetup() { showScreen('screen-setup'); buildSetup(); }

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  const n = selectedN;
  const chips = CHIP_MAP[n];
  const all = [];
  for (let i = 3; i <= 35; i++) all.push(i);
  shuffle(all);
  const deck = all.slice(9);
  const players = [];
  players.push({ name: 'あなた', isHuman: true, chips, cards: [] });
  for (let i = 1; i < n; i++) {
    players.push({ name: 'CP' + i, isHuman: false, chips, cards: [] });
  }
  shuffle(players);
  G = { deck, chipsOnCard: 0, players, current: 0, currentCard: null, phase: 'playing' };
  showScreen('screen-game');
  setButtons(true);
  nextCard();
  render();
  if (!G.players[G.current].isHuman) setTimeout(aiTurn, 800);
}

function nextCard() {
  if (G.deck.length === 0) { endGame(); return; }
  G.currentCard = G.deck.pop();
  G.chipsOnCard = 0;
}

function calcScore(cards, chips) {
  if (cards.length === 0) return -chips;
  const s = [...cards].sort((a, b) => a - b);
  let score = 0;
  for (let i = 0; i < s.length; i++) {
    if (i === 0 || s[i] !== s[i - 1] + 1) score += s[i];
  }
  return score - chips;
}

function getRuns(cards) {
  const s = [...cards].sort((a, b) => a - b);
  const r = new Set();
  for (let i = 0; i < s.length; i++) {
    if (s.includes(s[i] - 1) || s.includes(s[i] + 1)) r.add(s[i]);
  }
  return r;
}

function render() {
  document.getElementById('deck-info').textContent = `山札: ${G.deck.length} 枚`;
  const num = G.currentCard ?? '--';
  document.getElementById('card-number').textContent = num;
  document.getElementById('card-corner-tl').textContent = num;
  document.getElementById('card-corner-br').textContent = num;
  document.getElementById('card-horse').innerHTML = G.currentCard ? HORSE_SVG : '';

  const stack = document.getElementById('chips-stack');
  const c = G.chipsOnCard;
  if (c > 0) {
    const show = Math.min(c, 5);
    let html = '';
    for (let i = 0; i < show; i++) html += `<div class="chip"><div class="chip-inner"></div></div>`;
    html += `<div class="chips-count">${c}枚</div>`;
    stack.innerHTML = html;
  } else {
    stack.innerHTML = '';
  }

  const cur = G.players[G.current];
  document.getElementById('turn-wrap').innerHTML =
    `<span class="turn-badge">${cur.isHuman ? 'あなたの番' : cur.name + ' の番'}</span>`;

  const wrap = document.getElementById('players-wrap');
  wrap.innerHTML = '';
  G.players.forEach((p, i) => {
    const runs = getRuns(p.cards);
    const cardHtml = p.cards.sort((a, b) => a - b)
      .map(c => `<span class="card-tag${runs.has(c) ? ' run' : ''}">${c}</span>`).join('');
    const score = calcScore(p.cards, p.chips);
    const row = document.createElement('div');
    row.className = 'player-row' + (i === G.current ? ' is-active' : '');
    row.innerHTML = `
      <div class="p-header">
        <span class="p-name">${p.isHuman ? '▷ ' : ''}${p.name}</span>
        <span class="p-meta">
          <span>◉ ${p.chips}</span>
          <span class="p-score">${score}点</span>
        </span>
      </div>
      <div class="cards-list">${cardHtml || '<span class="no-cards">カードなし</span>'}</div>`;
    wrap.appendChild(row);
  });
}

function setButtons(on) {
  document.getElementById('btn-take').disabled = !on;
  document.getElementById('btn-pass').disabled = !on;
}

function playerAction(act) {
  const p = G.players[G.current];
  if (!p.isHuman || G.phase !== 'playing') return;
  if (act === 'pass' && p.chips <= 0) {
    document.getElementById('status-msg').textContent = 'チップがありません。カードを取ってください';
    return;
  }
  if (act === 'take') {
    p.cards.push(G.currentCard);
    p.chips += G.chipsOnCard;
    document.getElementById('status-msg').textContent = `カード ${G.currentCard} を取りました`;
    if (G.deck.length === 0) { render(); setTimeout(endGame, 600); return; }
    nextCard();
  } else {
    p.chips--; G.chipsOnCard++;
    document.getElementById('status-msg').textContent = 'どうぞどうぞ…';
    advanceTurn();
    render();
    if (!G.players[G.current].isHuman) { setButtons(false); setTimeout(aiTurn, 800); }
    return;
  }
  render();
  if (G.phase === 'playing' && !G.players[G.current].isHuman) { setButtons(false); setTimeout(aiTurn, 800); }
}

function advanceTurn() {
  G.current = (G.current + 1) % G.players.length;
}

function aiDecide(ai) {
  const card = G.currentCard;
  const chips = G.chipsOnCard;
  if (ai.chips <= 0) return 'take';
  const sorted = [...ai.cards].sort((a, b) => a - b);
  if (sorted.includes(card - 1) || sorted.includes(card + 1)) return 'take';
  const netCost = card - chips;
  if (netCost <= 0) return 'take';
  const chipsRatio = ai.chips / CHIP_MAP[G.players.length];
  const deckRatio = G.deck.length / 24;
  const threshold = 6 + (1 - chipsRatio) * 4 + deckRatio * 3;
  return netCost < threshold ? 'take' : 'pass';
}

function aiTurn() {
  if (G.phase !== 'playing') return;
  const ai = G.players[G.current];
  if (ai.isHuman) { setButtons(true); render(); return; }
  const dec = aiDecide(ai);
  if (dec === 'take') {
    ai.cards.push(G.currentCard);
    ai.chips += G.chipsOnCard;
    document.getElementById('status-msg').textContent = `${ai.name} がカード ${G.currentCard} を取りました`;
    if (G.deck.length === 0) { render(); setTimeout(endGame, 800); return; }
    nextCard();
    render();
    if (G.players[G.current].isHuman) { setButtons(true); }
    else setTimeout(aiTurn, 700);
  } else {
    ai.chips--; G.chipsOnCard++;
    document.getElementById('status-msg').textContent = `${ai.name}：どうぞどうぞ…`;
    advanceTurn();
    render();
    if (G.players[G.current].isHuman) { setButtons(true); }
    else setTimeout(aiTurn, 700);
  }
}

function endGame() {
  G.phase = 'ended';
  setButtons(false);
  const results = G.players.map(p => ({
    name: p.name, isHuman: p.isHuman,
    score: calcScore(p.cards, p.chips),
    cards: [...p.cards].sort((a, b) => a - b),
    chips: p.chips
  }));
  results.sort((a, b) => a.score - b.score);
  const minScore = results[0].score;
  const winners = results.filter(r => r.score === minScore);
  let titleText, titleColor;
  if (winners.some(w => w.isHuman)) {
    titleText = winners.length === 1 ? 'あなたの勝ち！' : '引き分け！';
    titleColor = '#1E3D10';
  } else {
    titleText = `${winners.map(w => w.name).join('・')} の勝ち`;
    titleColor = '#6B2737';
  }
  document.getElementById('result-title').textContent = titleText;
  document.getElementById('result-title').style.color = titleColor;
  const tbl = document.getElementById('result-table');
  tbl.innerHTML = '<tr><th>順位</th><th>名前</th><th>取ったカード</th><th>残チップ</th><th>合計</th></tr>' +
    results.map((r, i) => `
      <tr class="${r.score === minScore ? 'winner' : ''}">
        <td>${i + 1}</td>
        <td>${r.isHuman ? '▷ ' : ''}${r.name}</td>
        <td style="font-size:11px;">${r.cards.join(', ') || '−'}</td>
        <td>${r.chips}</td>
        <td>${r.score}点</td>
      </tr>`).join('');
  showScreen('screen-result');
}

showSetup();
</script>
